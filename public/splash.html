<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starting...</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* Fill the window completely */
            object-position: center center;
            /* Ensure true center */
            z-index: 2;
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            /* Smooth easing */
            transform-origin: center;
        }

        /* Exit Animation: Zoom Out & Fade */
        .exiting video {
            transform: scale(0.8);
            opacity: 0;
            filter: blur(5px);
        }
    </style>
</head>

<body>
    <video id="splashVideo" autoplay playsinline muted>
        <source src="splash.mp4" type="video/mp4">
    </video>
    <script>
        const video = document.getElementById('splashVideo');

        // Notify main process AFTER animation
        video.onended = () => {
            document.body.classList.add('exiting');

            // Wait for animation (800ms) before sending IPC
            setTimeout(() => {
                const ipc = window.electron?.ipcRenderer || (window.require && window.require('electron').ipcRenderer);
                if (ipc) ipc.send('splash-finished');
            }, 750);
        };

        // Error handling
        video.onerror = (e) => {
            const ipc = window.electron?.ipcRenderer || (window.require && window.require('electron').ipcRenderer);
            if (ipc) ipc.send('splash-finished');
        };

        // Ensure autoplay works
        video.play().catch(e => {
            // Retry with muted if failed (though we added muted attribute)
            video.muted = true;
            video.play();
        });
    </script>
</body>

</html>
