<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>PIX TECH APP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cairo:wght@700;900&family=Inter:wght@400;500;700&family=Orbitron:wght@700;900&family=Rajdhani:wght@700&family=VT323&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #030712; /* bg-gray-950 */
      }
      .font-cairo {
        font-family: 'Cairo', sans-serif;
      }
      .font-orbitron {
        font-family: 'Orbitron', sans-serif;
      }
      .font-vt323 {
        font-family: 'VT323', monospace;
      }
      .font-bebas-neue {
        font-family: 'Bebas Neue', cursive;
      }
      .font-rajdhani {
        font-family: 'Rajdhani', sans-serif;
      }
      /* Custom Scrollbar for App Feel */
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent; 
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #374151; 
        border-radius: 10px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: #4B5563; 
      }
    </style>
<link rel="stylesheet" href="/index.css">
